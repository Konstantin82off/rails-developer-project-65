databases:
  - name: bulletin-board-db
    databaseName: bulletin_board_production
    user: bulletin_board_user
    region: frankfurt

services:
  - type: web
    name: bulletin-board
    runtime: ruby
    region: frankfurt
    buildCommand: "./bin/render-build.sh"
    startCommand: "./bin/render-start.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bulletin-board-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: ROLLBAR_ACCESS_TOKEN
        sync: false
      - key: RUBY_VERSION
        value: 3.2.2
